packages:
  - 'packages/*'
  - 'packages/analysis/*'
  - 'demo/*'
allowBuilds:
  '@parcel/watcher': true
  cypress: true
  esbuild: true
minimumReleaseAgeExclude:
  - dompurify@3.3.2
  - dompurify@3.3.4
  - uuid@14.0.0
  - dompurify@3.4.0
overrides:
  dompurify@<3.3.2: ^3.3.2
  dompurify@<3.4.0: ^3.4.0
  dompurify@<=3.3.1: ^3.3.2
  dompurify@<=3.3.3: ^3.3.4
  dompurify@>=1.0.10 <3.4.0: ^3.4.0
  dompurify@>=3.0.1 <3.4.0: ^3.4.0
  dompurify@>=3.1.3 <=3.3.1: ^3.3.2
  uuid@<14.0.0: ^14.0.0
