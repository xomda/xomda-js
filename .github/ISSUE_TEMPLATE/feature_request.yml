name: Feature request
description: Suggest a new feature or improvement
title: "[feat]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the problem you're trying to solve and the change you have in mind.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Why does the current behaviour fall short?
      placeholder: I'm always frustrated when …
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen? Sketch the API, UI, or workflow if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they don't fit as well.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of xomda does this touch?
      multiple: true
      options:
        - core (model, schemas)
        - template engine
        - generation
        - UI / client
        - server / API
        - CLI / tooling
        - docs
        - other
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, links to prior art, related issues, etc.
    validations:
      required: false
