# Single CI workflow: lints, type-checks, builds and tests the full workspace
# (TypeScript packages + JVM integrations) via `pnpm test:all`.
# See AGENTS.md → "pnpm test:jvm chain" for the JVM build/test ordering.

name: CI

on:
  workflow_dispatch:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

env:
  # Quiet Maven in CI: batch mode + no download transfer progress lines.
  MAVEN_ARGS: '-B -ntp'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          # Self-contained pnpm binary (bundles Node) so the install step
          # doesn't depend on the runner's default Node, which is older than
          # pnpm 11.1.3's engines.node requirement (>=22.13). Must come before
          # setup-node so `cache: 'pnpm'` below can find pnpm on PATH.
          standalone: true

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Test (TS + JVM)
        run: pnpm test:all

      - name: Build
        run: pnpm build

      # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
      - name: Update dependency graph (Maven aggregator)
        uses: advanced-security/maven-dependency-submission-action@b275d12641ac2d2108b2cbb7598b154ad2f2cee8 # v5.0.0
        with:
          directory: integrations/jvm

      - name: Update dependency graph (Eclipse Tycho)
        uses: advanced-security/maven-dependency-submission-action@b275d12641ac2d2108b2cbb7598b154ad2f2cee8 # v5.0.0
        with:
          directory: integrations/jvm/eclipse

  gradle-dependency-submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      # Generates and submits a dependency graph, enabling Dependabot Alerts for all project dependencies.
      # See: https://github.com/gradle/actions/blob/main/dependency-submission/README.md
      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
        with:
          build-root-directory: integrations/jvm/gradle
