# Builds and tests the JVM modules that are built with Maven:
# generator-core (Java), maven plugin, and the Eclipse plugin (Tycho).
# See AGENTS.md → "pnpm test:jvm chain" for the rationale.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install xomda-generator-core to project-local repo
        run: pnpm test:jvm:install-core

      - name: Build & test Maven aggregator (generator-core + maven plugin)
        run: pnpm test:jvm:maven

      - name: Build & test Eclipse plugin (Tycho)
        run: pnpm test:jvm:eclipse

      # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
