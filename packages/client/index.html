<!doctype html>
<html lang="en">
<head>
  <script>
    (function () {
      try {
        var raw = localStorage.getItem('xomda-config')
        if (raw && JSON.parse(raw).darkMode) {
          document.documentElement.classList.add('theme-dark')
        }
      } catch (e) {}
    })()
  </script>
  <style>
    #app-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      opacity: 0;
      animation: app-loader-fade-in 200ms ease-out 500ms forwards;
      pointer-events: none;
      z-index: 2147483647;
    }
    #app-loader::after {
      content: '';
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0, 0, 0, 0.1);
      border-top-color: #1867c0;
      border-radius: 50%;
      animation: app-loader-spin 800ms linear infinite;
    }
    html.theme-dark #app-loader {
      background: #121212;
    }
    html.theme-dark #app-loader::after {
      border-color: rgba(255, 255, 255, 0.1);
      border-top-color: #1867c0;
    }
    @keyframes app-loader-fade-in {
      to { opacity: 1; }
    }
    @keyframes app-loader-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
<div id="app-loader" aria-hidden="true"></div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
